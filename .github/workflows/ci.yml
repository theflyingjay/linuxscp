name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 and libadwaita
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev openssh-server openssh-client

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all --verbose

      - name: Unit tests
        run: cargo test --all --verbose

      - name: Integration tests (local sshd)
        run: |
          ./scripts/test-server.sh start
          cargo test -p linuxscp --test sftp_roundtrip -- --ignored --test-threads=1
          ./scripts/test-server.sh stop
